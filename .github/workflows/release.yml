name: Marka Release Package

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-22.04]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Dependencies (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev libkeybinder-3.0-dev libayatana-appindicator3-dev

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get Packages
        run: flutter pub get

      - name: Build Windows
        if: matrix.os == 'windows-latest'
        run: flutter build windows --release

      - name: Build macOS
        if: matrix.os == 'macos-latest'
        run: flutter build macos --release

      - name: Download Inno Setup ChineseSimplified.isl
        if: matrix.os == 'windows-latest'
        run: |
          Invoke-WebRequest -Uri "https://raw.githubusercontent.com/jrsoftware/issrc/main/Files/Languages/ChineseSimplified.isl" -OutFile "windows\runner\ChineseSimplified.isl"

      - name: Build Windows x64 Installer
        if: matrix.os == 'windows-latest'
        run: |
          flutter build windows --release
          iscc /dMyAppArch=x64 windows\runner\marka_installer.iss

      - name: Build Windows ARM64 Installer
        if: matrix.os == 'windows-latest'
        run: |
          flutter build windows --release --arm64
          iscc /dMyAppArch=arm64 windows\runner\marka_installer.iss

      - name: Build macOS Installer
        if: matrix.os == 'macos-latest'
        run: |
          brew install create-dmg
          create-dmg \
            --volname "Marka Installer" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --icon "Marka.app" 200 190 \
            --hide-extension "Marka.app" \
            --app-drop-link 600 185 \
            "Marka-Installer-macOS.dmg" \
            "build/macos/Build/Products/Release/Marka.app"

      - name: Build Linux Installer
        if: matrix.os == 'ubuntu-22.04'
        run: |
          flutter build linux --release
          dart pub global activate flutter_to_debian
          export PATH="$PATH":"$HOME/.pub-cache/bin"
          flutter_to_debian
          mv debian/packages/*.deb Marka-Installer-Ubuntu.deb

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-installers
          path: |
            Marka-Installer-*.exe
            Marka-Installer-*.dmg
            Marka-Installer-*.deb

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
